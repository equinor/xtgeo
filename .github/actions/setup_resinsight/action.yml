name: Setup ResInsight
description: Download and install ResInsight for testing
inputs:
  install-dir:
    description: "Installation directory name"
    required: false
    default: "resinsight_bin"
outputs:
  install-path:
    description: "Path to ResInsight installation"
    value: ${{ steps.extract.outputs.INSTALL_PATH }}
runs:
  using: composite
  steps:
    - name: Download ResInsight
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        tmpdir="$(mktemp -d)"
        gh release download --repo OPM/ResInsight \
          --pattern 'ResInsight-Ubuntu_24.04_gcc*.zip' \
          --dir "$tmpdir"
        set -- "$tmpdir"/ResInsight-Ubuntu_24.04_gcc*.zip
        [ "$#" -eq 1 ] || { echo "Expected exactly one ResInsight archive, found $# : $*"; exit 1; }
        unzip "$1" -d "$tmpdir/resinsight_extract"
        mkdir -p "/tmp/${{ inputs.install-dir }}"
        # Release archives nest everything under a single top-level directory;
        # flatten it so bin/Python is directly under the install directory.
        mv "$tmpdir/resinsight_extract"/*/* "/tmp/${{ inputs.install-dir }}/"
    - name: Extract ResInsight
      id: extract
      shell: bash
      run: |
        sudo mv /tmp/${{ inputs.install-dir }} /opt/${{ inputs.install-dir }}
        echo "INSTALL_PATH=/opt/${{ inputs.install-dir }}" >> $GITHUB_OUTPUT
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbcommon-x11-0 libegl1 libgl1-mesa-dev mesa-common-dev libglfw3-dev libglu1-mesa-dev libxcb-cursor0
    - name: Install rips
      shell: bash
      run: |
        uv pip install "/opt/${{ inputs.install-dir }}/bin/Python"
